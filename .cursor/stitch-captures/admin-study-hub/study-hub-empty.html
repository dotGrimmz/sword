<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Weekly Study - Realign Ministries</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#D91F26",
                        "on-primary": "#FFFFFF",
                        surface: "#FFF5F0",
                        "surface-container": "#FFE8DC",
                        "on-surface": "#1A1A1A",
                        "on-surface-variant": "#4A4A4A",
                        outline: "#E0D5D0",
                        "outline-variant": "#F5E8E2"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Inter", "sans-serif"],
                        display: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #FFF5F0;
            color: #1A1A1A;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Top Navigation Bar (Custom implementation based on JSON but refined for Sub-page context) -->
<header class="fixed top-0 w-full z-50 flex items-center h-16 px-6 bg-surface">
<button aria-label="Go back to Today" class="flex items-center gap-2 group transition-transform active:scale-95">
<span class="material-symbols-outlined text-primary text-[24px]">arrow_back</span>
<span class="font-label font-semibold text-primary text-base">Today</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 text-center pt-16">
<!-- Empty State Container -->
<div class="max-w-md w-full flex flex-col items-center fade-in">
<!-- Centered Visual Anchor -->
<div class="relative mb-8">
<!-- Decorative background pulse -->
<div class="absolute inset-0 bg-surface-container rounded-full animate-ping opacity-20 scale-110"></div>
<div class="relative w-32 h-32 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 0, 'wght' 300;">book_2</span>
</div>
</div>
<!-- Typography Stack -->
<div class="space-y-3">
<h1 class="font-headline font-bold text-2xl text-on-surface tracking-tight">
                    No study posted this week
                </h1>
<p class="font-body text-on-surface-variant text-base leading-relaxed max-w-[280px] mx-auto">
                    Check back soon—your leaders are preparing this week’s prep.
                </p>
</div>
<!-- Optional soft interaction/hint -->
<div class="mt-12">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-white/50 border border-outline-variant rounded-full text-sm text-on-surface-variant/70 font-medium">
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
                    Preparation in progress
                </div>
</div>
</div>
</main>
<!-- Footer Branding -->
<footer class="w-full flex flex-col items-center pb-12 pt-4 opacity-40 grayscale hover:grayscale-0 transition-all duration-700">
<div class="flex flex-col items-center gap-1">
<!-- Symbolic Sword/Cross Wordmark Alignment -->
<div class="h-8 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'wght' 700;">swords</span>
<span class="font-headline font-extrabold tracking-widest text-[10px] uppercase text-on-surface">REALIGN</span>
</div>
<p class="font-label text-[9px] uppercase tracking-[0.2em] text-on-surface-variant">Ministries</p>
</div>
</footer>
<!-- Bottom Navigation Suppressed per Task Requirements for Sub-page journey -->
<!-- (JSON navigation shell is excluded to prioritize the focused 'Back' journey) -->
<script>
        // Micro-interaction for the back button
        document.querySelector('button').addEventListener('click', () => {
            document.body.classList.add('opacity-0');
            document.body.style.transition = 'opacity 0.4s ease';
            setTimeout(() => {
                // Logic for navigation would go here
                console.log("Navigating back...");
            }, 400);
        });

        // Soft entry animation for the wordmark
        window.addEventListener('DOMContentLoaded', () => {
            const footer = document.querySelector('footer');
            setTimeout(() => {
                footer.style.opacity = '0.6';
            }, 1000);
        });
    </script>
</body></html>
